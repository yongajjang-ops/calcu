<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- 계산기 본체 -->
  <rect x="96" y="56" width="320" height="400" rx="30" fill="#fff"/>

  <!-- 디스플레이 -->
  <rect x="120" y="80" width="272" height="80" rx="15" fill="#f4f4f4"/>
  <text x="370" y="135" font-family="Arial" font-size="48" font-weight="bold" fill="#333" text-anchor="end">123</text>

  <!-- 버튼들 -->
  <!-- 1행 -->
  <rect x="120" y="180" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="192" y="180" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="264" y="180" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="336" y="180" width="56" height="50" rx="10" fill="#ff9800"/>

  <!-- 2행 -->
  <rect x="120" y="245" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="192" y="245" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="264" y="245" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="336" y="245" width="56" height="50" rx="10" fill="#ff9800"/>

  <!-- 3행 -->
  <rect x="120" y="310" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="192" y="310" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="264" y="310" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="336" y="310" width="56" height="50" rx="10" fill="#ff9800"/>

  <!-- 4행 -->
  <rect x="120" y="375" width="56" height="50" rx="10" fill="#ff5c5c"/>
  <rect x="192" y="375" width="56" height="50" rx="10" fill="#fafafa"/>
  <rect x="264" y="375" width="128" height="50" rx="10" fill="#4caf50"/>

  <!-- 버튼 텍스트 -->
  <text x="148" y="215" font-family="Arial" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">7</text>
  <text x="220" y="215" font-family="Arial" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">8</text>
  <text x="292" y="215" font-family="Arial" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">9</text>
  <text x="364" y="215" font-family="Arial" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">/</text>

  <text x="148" y="280" font-family="Arial" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">4</text>
  <text x="220" y="280" font-family="Arial" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">5</text>
  <text x="292" y="280" font-family="Arial" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">6</text>
