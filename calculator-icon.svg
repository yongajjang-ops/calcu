  <text x="220" y="410" font-family="Arial" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">0</text>
  <text x="328" y="410" font-family="Arial" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">=</text>
