<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>кі„мӮ°кё°</title>

    <!-- PWA м„Өм • -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="кі„мӮ°кё°">

    <!-- м•„мқҙмҪҳ -->
    <link rel="icon" type="image/svg+xml" href="calculator-icon.svg">
    <link rel="apple-touch-icon" href="calculator-icon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 350px;
            overflow: hidden;
        }

        .display {
            background: #f4f4f4;
            padding: 20px;
            text-align: right;
            font-size: 2.5rem;
            font-weight: bold;
            min-height: 80px;
            width: 100%;
            border: none;
            border-bottom: 1px solid #e0e0e0;
            outline: none;
            font-family: 'Arial', sans-serif;
        }

        .display:focus {
            background: #fff;
            box-shadow: inset 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .history-section {
            background: #fafafa;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-label {
            font-size: 0.8rem;
            color: #666;
            padding: 8px 15px 5px;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            padding: 8px 15px;
            font-size: 0.95rem;
            color: #333;
            text-align: right;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #eee;
        }

        .history-item:hover, .history-item:active {
            background: #e8e8e8;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #e0e0e0;
        }

        .btn {
            background: #fff;
            border: none;
            padding: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.1s;
            user-select: none;
        }

        .btn:active {
            background: #d0d0d0;
        }

        .btn.operator {
            background: #ff9800;
            color: #fff;
        }

        .btn.operator:active {
            background: #e68900;
        }

        .btn.clear {
            background: #ff5c5c;
            color: #fff;
        }

        .btn.clear:active {
            background: #e04545;
        }

        .btn.backspace {
            background: #ff8a80;
            color: #fff;
        }

        .btn.backspace:active {
            background: #e57373;
        }

        .btn.equals {
            background: #4caf50;
            color: #fff;
        }

        .btn.equals:active {
            background: #3d9140;
        }

        .btn.number {
            background: #fafafa;
            color: #333;
        }

        .btn.number:active {
            background: #e0e0e0;
        }

        /* мҠӨнҒ¬лЎӨл°” мҠӨнғҖмқј */
        .history-list::-webkit-scrollbar {
            width: 5px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" value="0" inputmode="none">

        <div class="history-section">
            <div class="history-label">кі„мӮ° лӮҙм—ӯ (н„°м№ҳн•ҳм—¬ мҲҳм •)</div>
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="buttons">
            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-value="/">/</button>

            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-value="*">*</button>

            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-value="-">-</button>

            <button class="btn clear" data-value="C">C</button>
            <button class="btn number" data-value="0">0</button>
            <button class="btn backspace" data-value="backspace">&#9003;</button>
            <button class="btn operator" data-value="+">+</button>

            <button class="btn number" data-value=".">.</button>
            <button class="btn equals" data-value="=" style="grid-column: span 3">=</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor() {
                this.expression = '';
                this.history = [];
                this.display = document.getElementById('display');
                this.historyList = document.getElementById('historyList');
                this.isResultDisplayed = false;  // кІ°кіјк°Җ н‘ңмӢңлҗң мғҒнғңмқём§Җ

                this.init();
            }

            init() {
                // лІ„нҠј мқҙлІӨнҠё л°”мқёл”©
                document.querySelectorAll('.btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.onButtonClick(btn.dataset.value);
                    });
                });

                // мһ…л Ҙм°Ҫ м§Ғм ‘ мҲҳм • мқҙлІӨнҠё
                this.display.addEventListener('input', () => {
                    // мүјн‘ң м ңкұ°н•ҳкі  expressionм—җ м ҖмһҘ
                    this.expression = this.removeCommas(this.display.value);
                    this.isResultDisplayed = false;
                });

                // мһ…л Ҙм°Ҫм—җм„ң Enter нӮӨ мІҳлҰ¬
                this.display.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.calculate();
                    }
                });

                // нӮӨліҙл“ң мқҙлІӨнҠё (мһ…л Ҙм°Ҫ мҷёл¶Җ)
                document.addEventListener('keydown', (e) => {
                    // мһ…л Ҙм°Ҫм—җ нҸ¬м»ӨмҠӨк°Җ мһҲмңјл©ҙ л¬ҙмӢң (м§Ғм ‘ мһ…л Ҙ н—Ҳмҡ©)
                    if (document.activeElement === this.display) {
                        return;
                    }

                    if (e.key >= '0' && e.key <= '9') {
                        this.onButtonClick(e.key);
                    } else if (['+', '-', '*', '/', '.'].includes(e.key)) {
                        this.onButtonClick(e.key);
                    } else if (e.key === 'Enter' || e.key === '=') {
                        this.onButtonClick('=');
                    } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                        this.onButtonClick('C');
                    } else if (e.key === 'Backspace') {
                        this.onButtonClick('backspace');
                    }
                });
            }

            formatNumber(numStr) {
                try {
                    if (numStr.includes('.')) {
                        const [intPart, decPart] = numStr.split('.');
                        return parseInt(intPart).toLocaleString() + '.' + decPart;
                    }
                    return parseInt(numStr).toLocaleString();
                } catch {
                    return numStr;
                }
            }

            formatExpression(expr) {
                return expr.replace(/\d+\.?\d*/g, (match) => this.formatNumber(match));
            }

            removeCommas(expr) {
                return expr.replace(/,/g, '');
            }

            // нҸ¬л§·лҗң л¬ёмһҗм—ҙм—җм„ңмқҳ м»Өм„ң мң„м№ҳлҘј raw мң„м№ҳлЎң ліҖнҷҳ
            formattedToRawPosition(formattedStr, formattedPos) {
                let rawPos = 0;
                let formattedIndex = 0;
                while (formattedIndex < formattedPos && formattedIndex < formattedStr.length) {
                    if (formattedStr[formattedIndex] !== ',') {
                        rawPos++;
                    }
                    formattedIndex++;
                }
                return rawPos;
            }

            // raw мң„м№ҳлҘј нҸ¬л§·лҗң л¬ёмһҗм—ҙм—җм„ңмқҳ м»Өм„ң мң„м№ҳлЎң ліҖнҷҳ
            rawToFormattedPosition(formattedStr, rawPos) {
                let formattedIndex = 0;
                let rawIndex = 0;
                while (rawIndex < rawPos && formattedIndex < formattedStr.length) {
                    if (formattedStr[formattedIndex] !== ',') {
                        rawIndex++;
                    }
                    formattedIndex++;
                }
                return formattedIndex;
            }

            onButtonClick(value) {
                if (value === 'C') {
                    this.expression = '';
                    this.isResultDisplayed = false;
                    this.updateDisplay();
                } else if (value === 'backspace') {
                    this.isResultDisplayed = false;
                    this.handleBackspace();
                } else if (value === '=') {
                    this.calculate();
                } else {
                    this.handleInsert(value);
                }
            }

            handleBackspace() {
                const currentValue = this.display.value;
                const cursorPos = this.display.selectionStart;

                // м»Өм„ңк°Җ л§Ё м•һмқҙл©ҙ мӮӯм ңн•  кІғ м—ҶмқҢ
                if (cursorPos === 0) return;

                // нҸ¬л§·лҗң мң„м№ҳлҘј raw мң„м№ҳлЎң ліҖнҷҳ
                const rawPos = this.formattedToRawPosition(currentValue, cursorPos);

                // raw expressionм—җм„ң м»Өм„ң м•һмқҳ л¬ёмһҗ мӮӯм ң
                this.expression = this.expression.slice(0, rawPos - 1) + this.expression.slice(rawPos);

                // л””мҠӨн”Ңл Ҳмқҙ м—…лҚ°мқҙнҠё
                const newFormatted = this.expression === '' ? '0' : this.formatExpression(this.expression);
                this.display.value = newFormatted;

                // мғҲлЎңмҡҙ м»Өм„ң мң„м№ҳ кі„мӮ° л°Ҹ м„Өм •
                const newRawPos = rawPos - 1;
                const newFormattedPos = this.rawToFormattedPosition(newFormatted, newRawPos);
                this.display.setSelectionRange(newFormattedPos, newFormattedPos);
                this.display.focus();
            }

            handleInsert(char) {
                const isOperator = ['+', '-', '*', '/'].includes(char);
                const isNumber = /[0-9.]/.test(char);

                // кІ°кіјк°Җ н‘ңмӢңлҗң мғҒнғңм—җм„ң мһ…л Ҙн•ҳлҠ” кІҪмҡ°
                if (this.isResultDisplayed) {
                    if (isNumber) {
                        // мҲ«мһҗ мһ…л Ҙ мӢң кІ°кіјлҘј м§Җмҡ°кі  мғҲлЎң мӢңмһ‘
                        this.expression = char === '.' ? '0.' : char;
                        this.isResultDisplayed = false;
                        this.updateDisplay();
                        const len = this.display.value.length;
                        this.display.setSelectionRange(len, len);
                        this.display.focus();
                        return;
                    } else if (isOperator) {
                        // м—°мӮ°мһҗ мһ…л Ҙ мӢң кІ°кіјк°’м—җ мқҙм–ҙм„ң кі„мӮ°
                        this.isResultDisplayed = false;
                        // кІ°кіјк°’ л’Өм—җ м—°мӮ°мһҗ м¶”к°Җ
                    }
                }

                const currentValue = this.display.value;
                const cursorPos = this.display.selectionStart;

                // нҳ„мһ¬ к°’мқҙ '0'мқҙкі  мҲ«мһҗлҘј мһ…л Ҙн•ҳл©ҙ 0мқ„ лҢҖмІҙ
                if (currentValue === '0' && /[0-9]/.test(char)) {
                    this.expression = char;
                    this.updateDisplay();
                    this.display.setSelectionRange(1, 1);
                    this.display.focus();
                    return;
                }

                // нҸ¬л§·лҗң мң„м№ҳлҘј raw мң„м№ҳлЎң ліҖнҷҳ
                const rawPos = this.formattedToRawPosition(currentValue, cursorPos);

                // raw expressionм—җм„ң м»Өм„ң мң„м№ҳм—җ л¬ёмһҗ мӮҪмһ…
                this.expression = this.expression.slice(0, rawPos) + char + this.expression.slice(rawPos);

                // л””мҠӨн”Ңл Ҳмқҙ м—…лҚ°мқҙнҠё
                const newFormatted = this.formatExpression(this.expression);
                this.display.value = newFormatted;

                // мғҲлЎңмҡҙ м»Өм„ң мң„м№ҳ кі„мӮ° л°Ҹ м„Өм •
                const newRawPos = rawPos + 1;
                const newFormattedPos = this.rawToFormattedPosition(newFormatted, newRawPos);
                this.display.setSelectionRange(newFormattedPos, newFormattedPos);
                this.display.focus();
            }

            calculate() {
                // мһ…л Ҙм°Ҫм—җм„ң м§Ғм ‘ к°’мқ„ к°Җм ёмҳҙ (мӮ¬мҡ©мһҗк°Җ мҲҳм •н–Ҳмқ„ мҲҳ мһҲмқҢ)
                const currentValue = this.display.value;
                if (!currentValue || currentValue === '0') return;

                try {
                    const calcExpr = this.removeCommas(currentValue);
                    const result = eval(calcExpr);

                    if (result === Infinity || result === -Infinity) {
                        alert('0мңјлЎң лӮҳлҲҢ мҲҳ м—ҶмҠөлӢҲлӢӨ.');
                        this.expression = '';
                        this.updateDisplay();
                        return;
                    }

                    const resultStr = String(result);
                    const formattedExpr = this.formatExpression(calcExpr);
                    const formattedResult = this.formatNumber(resultStr);
                    const historyEntry = `${formattedExpr} = ${formattedResult}`;

                    this.addToHistory(historyEntry);
                    this.expression = resultStr;
                    this.isResultDisplayed = true;
                    this.updateDisplay();
                } catch {
                    alert('мһҳлӘ»лҗң мҲҳмӢқмһ…лӢҲлӢӨ.');
                    this.expression = '';
                    this.updateDisplay();
                }
            }

            updateDisplay() {
                if (this.expression === '') {
                    this.display.value = '0';
                } else {
                    this.display.value = this.formatExpression(this.expression);
                }
            }

            addToHistory(entry) {
                this.history.unshift(entry);
                if (this.history.length > 5) {
                    this.history.pop();
                }
                this.updateHistoryDisplay();
            }

            updateHistoryDisplay() {
                this.historyList.innerHTML = '';
                this.history.forEach((entry, index) => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.textContent = entry;
                    item.addEventListener('click', () => this.onHistorySelect(index));
                    this.historyList.appendChild(item);
                });
            }

            onHistorySelect(index) {
                const entry = this.history[index];
                const exprPart = entry.split(' = ')[0];
                this.expression = this.removeCommas(exprPart);
                this.isResultDisplayed = false;
                this.updateDisplay();
                // мһ…л Ҙм°Ҫм—җ нҸ¬м»ӨмҠӨлҘј мЈјм–ҙ л°”лЎң мҲҳм • к°ҖлҠҘн•ҳкІҢ
                this.display.focus();
                // м»Өм„ңлҘј лҒқмңјлЎң мқҙлҸҷ
                this.display.setSelectionRange(this.display.value.length, this.display.value.length);
            }
        }

        // м•ұ мӢңмһ‘
        new Calculator();
    </script>
</body>
</html>
